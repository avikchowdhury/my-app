<h2 mat-dialog-title>Receipt Details</h2>
<mat-dialog-content>
  <div><strong>Date:</strong> {{ data.receipt.uploadedAt | date:'short' }}</div>
  <div><strong>Vendor:</strong> {{ data.receipt.vendor || 'Unknown' }}</div>
  <div><strong>Amount:</strong> {{ data.receipt.totalAmount | currency }}</div>
  <div><strong>Category:</strong> {{ data.receipt.category || 'Uncategorized' }}</div>
  <!-- Notes field removed: not present in ReceiptDto -->
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
