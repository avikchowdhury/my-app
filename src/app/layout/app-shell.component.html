<div class="shell">
  <header class="shell-header">
    <div class="brand-header">
      <img src="assets/brand/brand.webp" alt="App Logo" class="app-logo" />
      <div class="brand-title-block">
        <p class="eyebrow">AI Expense Tracker</p>
        <h1>Smart money monitoring for everyday spending</h1>
      </div>
    </div>

    <div class="shell-actions">
      <a routerLink="/profile" class="profile-chip">
        <div class="profile-avatar">
          <img
            *ngIf="profile?.avatarUrl"
            [src]="profile?.avatarUrl"
            alt="Profile avatar"
          />
          <span *ngIf="!profile?.avatarUrl">{{ avatarInitials }}</span>
        </div>

        <div class="profile-meta">
          <strong>{{ profile?.email || "Your profile" }}</strong>
          <small>{{ profile?.role || "Account settings" }}</small>
        </div>
      </a>

      <button
        mat-raised-button
        color="primary"
        class="logout-button"
        (click)="logout()"
      >
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </header>

  <nav class="shell-nav">
    <a
      *ngFor="let item of visibleNavigation"
      [routerLink]="item.path"
      routerLinkActive="active"
      class="nav-link"
    >
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <main class="shell-content">
    <router-outlet></router-outlet>
  </main>
</div>
